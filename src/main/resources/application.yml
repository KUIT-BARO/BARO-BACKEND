spring:
  profiles:
    active:
    group:
      "local": "localDB, devPort, web-mvc"
      "dev": "devDB, devPort, web-mvc"
      "h2": "h2DB, devPort, web-mvc"


---

spring:
  config:
    activate:
      on-profile: "localDB"

  datasource:
    url: ${DATASOURCE_URL}?serverTimezone=Asia/Seoul
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}

    driver-class-name: org.mariadb.jdbc.Driver
    dbcp2:
      validation-query: select 1
  sql:
    init:
      platform: mysql
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB

---

spring:
  config:
    activate:
      on-profile: "devDB"

  datasource:
    url: ${DATASOURCE_URL_DEV}?serverTimezone=Asia/Seoul
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}

    driver-class-name: org.mariadb.jdbc.Driver
    dbcp2:
      validation-query: select 1
  sql:
    init:
      platform: mysql
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB

---

spring:
  config:
    activate:
      on-profile: "devPort"

server:
  port: 8080

---

spring:
  config:
    activate:
      on-profile: "web-mvc"

  mvc:
    dispatcherServlet:
      throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

  messages:
    basename: errors

---

spring:
  jackson:
    time-zone: Asia/Seoul

---

spring:
  config:
    activate:
      on-profile: "h2DB"
  
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/demo
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
      globally_quoted_identifiers: true
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
