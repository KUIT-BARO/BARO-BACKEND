name: CD with Gradle and Docker

on:
  push:
    branches:
      - 'main'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: ☕️ set up JDK 17        # 프로젝트의 java 버전에 맞추어 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: github
          setting-path: ${{ github.workspace }}

      - name: "👏🏻 grant execute permission for gradlew"
        run: chmod +x gradlew

      - name: "🐘 build with Gradle (without test)"
        run: ./gradlew clean build -x test --stacktrace

      - name: "🐳 Docker login"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: "🐳 Docker build & push"
        run:  |
          docker build -f Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE }}
          
      # AWS 인증
      - name: AWS configure credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}


      - name: "🚀 deploy to server"
        run: |
          aws ssm send-command \
            --instance-ids "i-xxxxxxxxxxxxxxxxx" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploying application" \
            --parameters 'commands=[
              "sudo docker stop BARO_CONTAINER || true",
              "sudo docker rm BARO_CONTAINER || true",
              "sudo docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE }}",
              "sudo docker run -d -p 8000:8080 --name BARO_CONTAINER ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE }}",
              "sudo docker image prune -f"
            ]' \
            --output text
